<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Free Fire</title>
    <link rel="stylesheet" href="stylee.css">
</head>
<body>

    <div class="quiz-container">
        <h1>FF QUIZ</h1>
        <hr>
        
        <div id="game-zone">
            <h2 id="question">Carregando pergunta...</h2>
            <div id="options-container" class="options-grid">
                </div>
        </div>

        <div id="result-zone" class="hidden">
            <h2>Fim de Jogo!</h2>
            <p id="score-text"></p>
            <button id="restart-btn" onclick="restartGame()">Jogar Novamente</button>
        </div>
    </div>

    <script src="java.script"></script>
</body>
</html>
